<div class="w-full flex space-x-10">
  <div class="flex flex-col w-1/3">
    <div class="w-full rounded border border-gray-400">
      <img alt="ecommerce" class="w-full object-cover object-center" [src]="cover()" />
    </div>
    <div class="flex items-center justify-center mt-1">
      <div class="grid grid-cols-3 gap-1">
        @for (image of product()?.images; track image; let i = $index) {
          <img
            alt="ecommerce"
            class="object-cover object-center rounded border-2  transition"
            [class.border-indigo-400]="image === cover()"
            [class.scale-105]="image === cover()"
            [class.border-transparent]="image != cover()"
            [src]="image"
            (click)="changeCover(image)"
          />
        }
      </div>
    </div>
  </div>
  <div class="mt-5 w-full">
    <h2 class="text-sm title-font tracking-widest">{{ product()?.category?.name }}</h2>
    <h1 class="text-3xl title-font font-medium mb-1">{{ product()?.title }}</h1>
    <p class="leading-relaxed">
      {{ product()?.description }}
    </p>
    <p class="title-font font-medium text-2xl mt-5">
      {{ product()?.price | currency: 'COP' : 'symbol' : '1.2-2' : 'es-CO' }}
    </p>
    <button
      (click)="addToCart()"
      class="flex text-white bg-red-500 border-0 py-2 px-6 focus:outline-none hover:bg-red-600 rounded"
    >
      Add To Cart
    </button>
  </div>
</div>
